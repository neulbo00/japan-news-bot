name: 일본 뉴스 자동 번역 포스팅

on:
  schedule:
    - cron: '0 23 * * *'  # 매일 오전 8시 (한국시간 기준)
  workflow_dispatch:      # 수동 실행 버튼도 가능

jobs:
  run-news-bot:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v2

      - name: Python 설치
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 패키지 설치
        run: |
          pip install -r requirements.txt

      - name: 뉴스봇 실행
        run: |
          python main.py
